<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Project Survey Form</title>
  <desc id="desc">Social preview image for Perkom Indah Murni project survey form.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101010" />
      <stop offset="0.58" stop-color="#141820" />
      <stop offset="1" stop-color="#081d3a" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#008ed7" />
      <stop offset="1" stop-color="#1642d2" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.34" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#background)" />
  <path d="M0 488 C190 424 316 526 516 470 C728 411 828 261 1200 325 L1200 630 L0 630 Z" fill="#0b63b7" opacity="0.14" />
  <path d="M0 534 C240 455 359 589 599 509 C803 441 951 420 1200 486 L1200 630 L0 630 Z" fill="#1642d2" opacity="0.16" />

  <rect x="72" y="70" width="1056" height="490" rx="28" fill="#151515" opacity="0.92" filter="url(#softShadow)" />
  <rect x="73" y="71" width="1054" height="488" rx="27" fill="none" stroke="#ffffff" stroke-opacity="0.08" />
  <rect x="104" y="104" width="220" height="8" rx="4" fill="url(#accent)" />

  <image href="perkom-loading.png" x="52" y="144" width="570" height="224" preserveAspectRatio="xMinYMid meet" />

  <text x="104" y="414" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700" letter-spacing="0">
    Project Survey Form
  </text>
  <text x="106" y="462" fill="#c8ced8" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400" letter-spacing="0">
    Record project requirement data in one structured form.
  </text>
</svg>
