<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internal Link Portal | Perkom Indah Murni</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="shortcut icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <meta name="theme-color" content="#101010" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Perkom Link Portal" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="Perkom Link Portal" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    :root {
      --bg: #101010;
      --surface: #151515;
      --surface-soft: #101010;
      --surface-hover: #1d1d1d;

      --text: #f6f6f6;
      --text-muted: #b9b9b9;
      --text-soft: #818181;

      --border: rgba(255, 255, 255, 0.09);
      --border-strong: rgba(255, 255, 255, 0.16);

      --primary: #ffffff;
      --primary-contrast: #111111;

      --radius-xl: 16px;
      --radius-lg: 14px;
      --radius-md: 12px;
      --radius-sm: 10px;

      --shadow-soft: 0 14px 36px rgba(0, 0, 0, 0.28);

      --container: 520px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: "Roboto", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    input {
      font: inherit;
    }

    .page-shell {
      width: 100%;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .page-container {
      width: 100%;
      max-width: var(--container);
    }

    .profile-card,
    .search-card,
    .link-section,
    .footer {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
    }

    .profile-card {
      overflow: hidden;
    }

    .profile-top {
      padding: 28px 26px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
    }

    .company-logo {
      width: 62px;
      height: 62px;
      flex: 0 0 auto;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #ffffff;
      color: #111111;
    }

    .company-logo span {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .company-logo img {
      width: 70%;
      height: 70%;
      object-fit:cover;
    }

    .company-name {
      margin: 0 0 4px;
      font-size: 15px;
      line-height: 1.35;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    h1 {
      margin: 0;
      font-size: 15px;
      line-height: 1.35;
      font-weight: 500;
      color: var(--text-muted);
    }

    .profile-divider {
      width: 100%;
      height: 1px;
      background: var(--border);
    }

    .profile-description {
      margin: 0;
      padding: 20px 26px 24px;
      font-size: 14px;
      line-height: 1.5;
      letter-spacing: -0.02em;
      color: var(--text-muted);
      text-align: center;
    }

    .search-card {
      margin-top: 12px;
      padding: 22px;
    }

    .search-card label {
      display: block;
      margin-bottom: 13px;
      font-size: 15px;
      line-height: 1.4;
      font-weight: 500;
      letter-spacing: 0;
      color: var(--text);
    }

    .search-input-wrap {
      position: relative;
    }

    .search-icon {
      position: absolute;
      top: 50%;
      left: 14px;
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transform: translateY(-50%);
      color: var(--text-soft);
      pointer-events: none;
    }

    .search-icon i {
      font-size: 15px;
      line-height: 1;
    }

    .search-input-wrap input {
      width: 100%;
      height: 46px;
      padding: 0 16px 0 40px;
      border: 1px solid var(--border);
      outline: none;
      border-radius: var(--radius-sm);
      background: var(--surface-soft);
      color: var(--text);
      font-size: 14px;
      transition:
        border-color 180ms ease,
        background-color 180ms ease,
        box-shadow 180ms ease;
    }

    .search-input-wrap input::placeholder {
      color: var(--text-soft);
    }

    .search-input-wrap input:focus {
      border-color: var(--border-strong);
      background: #111111;
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.055);
    }

    .link-section {
      margin-top: 12px;
      padding: 20px;
    }

    .section-header {
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .section-header h2 {
      margin: 0;
      font-size: 15px;
      line-height: 1.4;
      font-weight: 500;
      letter-spacing: 0;
      color: var(--text);
    }

    .section-header span {
      flex: 0 0 auto;
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 600;
    }

    .link-list {
      display: grid;
      gap: 10px;
    }

    .link-card {
      min-height: 76px;
      padding: 16px;
      border-radius: var(--radius-md);
      display: grid;
      grid-template-columns: 42px 1fr auto;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      transition:
        transform 180ms ease,
        background-color 180ms ease,
        border-color 180ms ease,
        box-shadow 180ms ease;
    }

    .link-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      color: var(--text-muted);
      flex: 0 0 auto;
      transition:
        background-color 180ms ease,
        border-color 180ms ease,
        color 180ms ease;
    }

    .link-icon i {
      font-size: 18px;
      line-height: 1;
    }

    .link-card:hover .link-icon {
      background: #272727;
      border-color: var(--border-strong);
      color: var(--text);
    }

    .link-card:hover {
      transform: translateY(-2px);
      background: var(--surface-hover);
      border-color: var(--border-strong);
      box-shadow: var(--shadow-soft);
    }

    .link-card:active {
      transform: translateY(0) scale(0.99);
    }

    .link-content {
      min-width: 0;
    }

    .link-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .link-title {
      margin: 0;
      font-size: 15px;
      line-height: 1.4;
      font-weight: 700;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .link-description {
      margin: 4px 0 0;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.4;
      letter-spacing: -0.02em;
      overflow: hidden;
      display: -webkit-box;
      line-clamp: 1;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
    }

    .link-arrow {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-soft);
      background: transparent;
      border: 1px solid transparent;
      opacity: 0.72;
      transform: translateX(0);
      transition:
        background-color 180ms ease,
        border-color 180ms ease,
        color 180ms ease,
        opacity 180ms ease,
        transform 180ms ease;
    }

    .link-arrow svg {
      width: 18px;
      height: 18px;
      display: block;
      stroke: currentColor;
    }

    .link-card:hover .link-arrow {
      color: var(--text);
      background: #272727;
      border-color: var(--border);
      opacity: 1;
      transform: translate(2px, -2px);
    }

    .empty-state {
      padding: 38px 18px 34px;
      text-align: center;
      border-radius: var(--radius-lg);
      background: var(--surface-soft);
      border: 1px dashed var(--border-strong);
    }

    .empty-icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 14px;
      border-radius: var(--radius-md);
      display: grid;
      place-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-soft);
      font-size: 26px;
    }

    .empty-state h3 {
      margin: 0;
      font-size: 16px;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .empty-state p {
      margin: 6px 0 0;
      color: var(--text-muted);
      font-size: 14px;
    }

    .footer {
      margin-top: 12px;
      padding: 22px 20px;
      text-align: center;
    }

    .footer p {
      margin: 0;
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.6;
    }

    .footer p:first-child {
      color: var(--text-muted);
      font-weight: 400;
    }

    @media (min-width: 760px) {
      .page-shell {
        padding: 54px 24px;
      }

      .page-container {
        max-width: 720px;
      }

      .profile-top {
        padding: 32px 32px 24px;
        flex-direction: row;
        align-items: center;
        gap: 16px;
        text-align: left;
      }

      .profile-description {
        padding: 20px 32px 20px;
        font-size: 14px;
        text-align: left;
      }

      .link-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (min-width: 1080px) {
      .page-container {
        max-width: 860px;
      }

      .link-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .link-card {
        grid-template-columns: 42px 1fr auto;
      }

      .link-description {
        display: block;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-clamp: unset;
        -webkit-line-clamp: unset;
        -webkit-box-orient: unset;
      }
    }
  </style>
</head>

<body>
  <main class="page-shell">
    <div class="page-container">
      <header class="profile-card">
        <div class="profile-top">
          <div class="company-logo">
            <img src="perkom-logo.png" alt="Logo Perusahaan" />
          </div>

          <div>
            <p class="company-name">Perkom Indah Murni</p>
            <h1>Internal Link Portal</h1>
          </div>
        </div>

        <div class="profile-divider"></div>

        <p class="profile-description">
          Centralized access to internal documents, systems, tools, and company resources.
        </p>
      </header>

      <section class="search-card">
        <label for="searchInput">Search Links</label>
        <div class="search-input-wrap">
          <span class="search-icon" aria-hidden="true">
            <i class="bi bi-search"></i>
          </span>
          <input id="searchInput" type="text" placeholder="Search by name, category, or description"
            autocomplete="off" />
        </div>
      </section>

      <section class="link-section">
        <div class="section-header">
          <h2>Internal Links</h2>
          <span id="resultCount">0 links</span>
        </div>

        <div id="linkList" class="link-list"></div>

        <div id="emptyState" class="empty-state" hidden>
          <div class="empty-icon">⌕</div>
          <h3>No internal links found.</h3>
          <p>Coba gunakan kata kunci lain.</p>
        </div>
      </section>

      <footer class="footer">
        <p>© 2026 Perkom Link Portal</p>
        <p>Developed by Wahyu</p>
      </footer>
    </div>
  </main>

  <script>
    const internalLinks = [
      {
        name: "Document Proposal Project Ayana Bali",
        category: "HR & Administration",
        description: "Penawaran, datasheet, design drawing, RFSI dan lainnya.",
        icon: "bi-file-earmark-text",
        url: "https://ptperkomindahmurni.sharepoint.com/sites/DOCUMENTPROPOSALPROJECTAYANA-GROUP/Shared%20Documents/Forms/AllItems.aspx",
        badge: "Frequently Used",
      },
      {
        name: "Document Pre Installation Project Ayana Bali",
        category: "Finance",
        description: "Material approval, shop drawing, schedule kerja dan lainnya.",
        icon: "bi-file-earmark-text",
        url: "https://ptperkomindahmurni.sharepoint.com/sites/DOCUMENTPREINSTALLATION/Shared%20Documents/Forms/AllItems.aspx",
        badge: "Important",
      },
      {
        name: "Document After Installation Project Ayana Bali",
        category: "Project Management",
        description: "BAST, scan DO, as built drawing, foto pemasangan dan lainnya.",
        icon: "bi-file-earmark-text",
        url: "https://ptperkomindahmurni.sharepoint.com/sites/DOCUMENTAFTERINSTALLATION/Dokumen%20Berbagi/Forms/AllItems.aspx",
        badge: "Frequently Used",
      },
      {
        name: "Form Biaya Perjalanan",
        category: "Documentation",
        description: "Form pengajuan uang muka dan realisasi biaya perjalanan.",
        icon: "bi-file-earmark-text",
        url: "https://travelexpensepro.vercel.app/",
        badge: "",
      },
      {
        name: "Project Quotation Status | Wahyu",
        category: "Documentation",
        description: "Update progress penawaran project cabling",
        icon: "bi-file-earmark-text",
        url: "https://ptperkomindahmurni-my.sharepoint.com/:x:/g/personal/wahyu_perkom_co_id/IQDGbV5HQfc-R6Y7A2CpGldgASrJivNMGbXQg4U_ySQTwMM?rtime=qBUZT2LT3kg",
        badge: "",
      },
      {
        name: "Project Quotation Status | April",
        category: "Documentation",
        description: "Update progress penawaran project cabling",
        icon: "bi-file-earmark-text",
        url: "",
        badge: "",
      },
      {
        name: "Project Progress Ayana Bali",
        category: "Documentation",
        description: "Update progress pekerjaan project Ayana Bali",
        icon: "bi-file-earmark-text",
        url: "https://docs.google.com/spreadsheets/d/1INY7dGlIusZRGX0RKLKqqjtIiH4rxtKUb-7Us-DbvaI/edit?gid=1533323113#gid=1533323113",
        badge: "",
      },
    ];

    const searchInput = document.getElementById("searchInput");
    const linkList = document.getElementById("linkList");
    const resultCount = document.getElementById("resultCount");
    const emptyState = document.getElementById("emptyState");

    function createLinkCard(link) {
      const card = document.createElement("a");

      card.className = "link-card";
      card.href = link.url;
      card.target = "_blank";
      card.rel = "noopener noreferrer";
      card.setAttribute(
        "aria-label",
        `Open ${link.name} - ${link.description}`
      );

      card.innerHTML = `
        <div class="link-icon" aria-hidden="true">
          <i class="bi ${link.icon}"></i>
        </div>

        <div class="link-content">
          <div class="link-title-row">
            <h3 class="link-title">${link.name}</h3>
          </div>

          <p class="link-description">${link.description}</p>
        </div>

        <span class="link-arrow" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 17L17 7" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M9 7H17V15" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </span>
      `;

      return card;
    }

    function isMatch(link, keyword) {
      const searchableText = `
        ${link.name}
        ${link.category}
        ${link.description}
        ${link.badge}
      `.toLowerCase();

      return searchableText.includes(keyword.toLowerCase());
    }

    function renderLinks() {
      const keyword = searchInput.value.trim();

      const filteredLinks = keyword
        ? internalLinks.filter((link) => isMatch(link, keyword))
        : internalLinks;

      linkList.innerHTML = "";

      filteredLinks.forEach((link) => {
        linkList.appendChild(createLinkCard(link));
      });

      resultCount.textContent = `${filteredLinks.length} links`;

      const hasResult = filteredLinks.length > 0;
      emptyState.hidden = hasResult;
      linkList.hidden = !hasResult;
    }


    searchInput.addEventListener("input", renderLinks);

    renderLinks();
  </script>
</body>

</html>
