<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internal Link Portal | Perkom Indah Murni</title>
  <meta name="description"
    content="Centralized access to internal company links and shared resources." />
  <link rel="icon" type="image/png" href="assets/images/favicon.png" />
  <link rel="shortcut icon" type="image/png" href="assets/images/favicon.png" />
  <link rel="apple-touch-icon" href="assets/images/perkom-logo.png" />
  <meta id="themeColorMeta" name="theme-color" content="#101010" />
  <meta property="og:locale" content="id_ID" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Perkom Indah Murni" />
  <meta property="og:title" content="Perkom Link Portal" />
  <meta property="og:description"
    content="Centralized access to internal company links and shared resources." />
  <meta property="og:image" content="assets/images/social-preview.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Perkom Link Portal social preview." />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Perkom Link Portal" />
  <meta name="twitter:description"
    content="Centralized access to internal company links and shared resources." />
  <meta name="twitter:image" content="assets/images/social-preview.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Perkom Link Portal" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="Perkom Link Portal" />
  <script src="main.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div id="pageLoader" class="loading-screen" role="status" aria-live="polite" aria-label="Loading page">
    <div class="loading-mark">
      <img class="loading-logo loading-logo-dark" src="assets/images/perkom-loading.png" alt="" aria-hidden="true" />
      <img class="loading-logo loading-logo-light" src="assets/images/perkom-loading-light.png" alt="" aria-hidden="true" />
    </div>
  </div>

  <main class="page-shell">
    <div class="page-container">
      <header class="profile-card">
        <div class="profile-top">
          <div class="company-logo">
            <img src="assets/images/perkom-logo.png" alt="Logo Perusahaan" />
          </div>

          <div>
            <p class="company-name">Perkom Indah Murni</p>
            <h1>Internal Link Portal</h1>
          </div>
        </div>

        <div class="profile-divider"></div>

        <p class="profile-description">
          Centralized access to internal company links and shared resources.
        </p>
      </header>

      <section class="search-card">
        <label for="searchInput">Search Links</label>
        <div class="search-input-wrap">
          <span class="search-icon" aria-hidden="true">
            <i class="bi bi-search"></i>
          </span>
          <input id="searchInput" type="text" placeholder="Search by name or description"
            autocomplete="off" />
        </div>
      </section>

      <section class="link-section">
        <div class="section-header">
          <h2>Internal Links</h2>
          <span id="resultCount">0 links</span>
        </div>

        <div id="linkList" class="link-list"></div>

        <div id="emptyState" class="empty-state" hidden>
          <div class="empty-icon">⌕</div>
          <h3>No internal links found.</h3>
          <p>Coba gunakan kata kunci lain.</p>
        </div>
      </section>

      <footer class="footer">
        <p>© 2026 Perkom Link Portal</p>
        <p>Developed by Wahyu</p>
        <div class="theme-switch" role="group" aria-label="Theme preference">
          <span id="themeSwitchLabel" class="theme-switch-label">Dark</span>
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="Switch to light theme"
            aria-pressed="false">
            <i id="themeToggleIcon" class="bi bi-moon-fill" aria-hidden="true"></i>
          </button>
        </div>
      </footer>
    </div>
  </main>

</body>

</html>
