<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internal Link Portal | Perkom Indah Murni</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="shortcut icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="perkom-logo.png" />
  <meta id="themeColorMeta" name="theme-color" content="#101010" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Perkom Link Portal" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="Perkom Link Portal" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script>
    (() => {
      try {
        if (localStorage.getItem("linkPortalTheme") === "light") {
          document.documentElement.dataset.theme = "light";
        }
      } catch {
        // Keep the default dark theme if storage is unavailable.
      }
    })();
  </script>

  <style>
    :root {
      color-scheme: dark;
      --bg: #101010;
      --surface: #151515;
      --surface-soft: #101010;
      --surface-hover: #1d1d1d;
      --control-hover: #272727;
      --focus-bg: #111111;
      --focus-ring: rgba(255, 255, 255, 0.055);

      --text: #f6f6f6;
      --text-muted: #b9b9b9;
      --text-soft: #818181;

      --border: rgba(255, 255, 255, 0.09);
      --border-strong: rgba(255, 255, 255, 0.16);

      --radius-xl: 16px;
      --radius-lg: 14px;
      --radius-md: 12px;
      --radius-sm: 10px;

      --shadow-soft: 0 14px 36px rgba(0, 0, 0, 0.28);

      --container: 520px;
      --stack-gap: 10px;
    }

    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-soft: #f3f5f8;
      --surface-hover: #f7f8fa;
      --control-hover: #eef1f5;
      --focus-bg: #ffffff;
      --focus-ring: rgba(15, 23, 42, 0.08);

      --text: #15171a;
      --text-muted: #4b5563;
      --text-soft: #7a8390;

      --border: rgba(15, 23, 42, 0.1);
      --border-strong: rgba(15, 23, 42, 0.18);

      --shadow-soft: 0 14px 36px rgba(15, 23, 42, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: "Roboto", sans-serif;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    input {
      font: inherit;
    }

    button {
      font: inherit;
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      background: var(--bg);
      opacity: 1;
      visibility: visible;
      transition:
        opacity 240ms ease,
        visibility 240ms ease;
    }

    .loading-screen.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loading-mark {
      width: 230px;
      height: 230px;
      display: grid;
      place-items: center;
      perspective: 720px;
    }

    .loading-logo {
      display: block;
      width: 200px;
      height: 200px;
      object-fit: contain;
      filter: drop-shadow(0 10px 22px rgba(0, 121, 255, 0.22));
      transform-style: preserve-3d;
      animation: loading-logo-spin 2200ms cubic-bezier(0.55, 0.08, 0.24, 1) infinite;
    }

    .loading-logo-light {
      display: none;
    }

    [data-theme="light"] .loading-logo-dark {
      display: none;
    }

    [data-theme="light"] .loading-logo-light {
      display: block;
    }

    @keyframes loading-logo-spin {
      0% {
        transform: rotateY(0deg) rotateX(0deg) scale(1);
      }

      50% {
        transform: rotateY(180deg) rotateX(8deg) scale(1.04);
      }

      to {
        transform: rotateY(360deg) rotateX(0deg) scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .loading-logo {
        animation-duration: 3200ms;
      }
    }

    .page-shell {
      width: 100%;
      min-height: 100vh;
      padding: 18px 16px 28px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    @supports (padding: max(0px)) {
      .page-shell {
        padding:
          max(18px, env(safe-area-inset-top))
          max(16px, env(safe-area-inset-right))
          max(28px, env(safe-area-inset-bottom))
          max(16px, env(safe-area-inset-left));
      }
    }

    .page-container {
      width: 100%;
      max-width: var(--container);
    }

    .profile-card,
    .search-card,
    .link-section,
    .footer {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
    }

    .profile-card {
      overflow: hidden;
    }

    .profile-top {
      padding: 16px;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      text-align: left;
    }

    .company-logo {
      width: 54px;
      height: 54px;
      flex: 0 0 auto;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #ffffff;
      border: 1px solid var(--border-strong);
      color: #111111;
    }

    .company-logo img {
      width: 70%;
      height: 70%;
      object-fit: contain;
    }

    .profile-top > div:last-child {
      min-width: 0;
    }

    .company-name {
      margin: 0 0 4px;
      font-size: 16px;
      line-height: 1.35;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    h1 {
      margin: 0;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 500;
      color: var(--text-muted);
    }

    .profile-divider {
      width: 100%;
      height: 1px;
      background: var(--border);
    }

    .profile-description {
      margin: 0;
      padding: 16px;
      font-size: 14px;
      line-height: 1.55;
      letter-spacing: -0.02em;
      color: var(--text-muted);
      text-align: left;
    }

    .search-card {
      margin-top: var(--stack-gap);
      padding: 16px;
    }

    .search-card label {
      display: block;
      margin-bottom: 10px;
      font-size: 14px;
      line-height: 1.4;
      font-weight: 500;
      letter-spacing: 0;
      color: var(--text);
    }

    .search-input-wrap {
      position: relative;
    }

    .search-icon {
      position: absolute;
      top: 50%;
      left: 13px;
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transform: translateY(-50%);
      color: var(--text-soft);
      pointer-events: none;
    }

    .search-icon i {
      font-size: 15px;
      line-height: 1;
    }

    .search-input-wrap input {
      width: 100%;
      height: 48px;
      padding: 0 14px 0 38px;
      border: 1px solid var(--border);
      outline: none;
      border-radius: var(--radius-sm);
      background: var(--surface-soft);
      color: var(--text);
      font-size: 16px;
      transition:
        border-color 180ms ease,
        background-color 180ms ease,
        box-shadow 180ms ease;
    }

    .search-input-wrap input::placeholder {
      color: var(--text-soft);
    }

    .search-input-wrap input:focus {
      border-color: var(--border-strong);
      background: var(--focus-bg);
      box-shadow: 0 0 0 4px var(--focus-ring);
    }

    .link-section {
      margin-top: var(--stack-gap);
      padding: 16px;
    }

    .section-header {
      margin-bottom: 10px;
      padding: 0 2px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .section-header h2 {
      margin: 0;
      font-size: 15px;
      line-height: 1.4;
      font-weight: 500;
      letter-spacing: 0;
      color: var(--text);
    }

    .section-header span {
      flex: 0 0 auto;
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 600;
    }

    .link-list {
      display: grid;
      gap: 8px;
    }

    .link-card {
      min-height: 78px;
      padding: 14px;
      border-radius: var(--radius-md);
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      transition:
        transform 180ms ease,
        background-color 180ms ease,
        border-color 180ms ease,
        box-shadow 180ms ease;
    }

    .link-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      color: var(--text-muted);
      flex: 0 0 auto;
      transition:
        background-color 180ms ease,
        border-color 180ms ease,
        color 180ms ease;
    }

    .link-icon i {
      font-size: 18px;
      line-height: 1;
    }

    .link-card:hover .link-icon {
      background: var(--control-hover);
      border-color: var(--border-strong);
      color: var(--text);
    }

    .link-card:hover {
      transform: translateY(-2px);
      background: var(--surface-hover);
      border-color: var(--border-strong);
      box-shadow: var(--shadow-soft);
    }

    .link-card:active {
      transform: translateY(0) scale(0.99);
    }

    .link-content {
      min-width: 0;
    }

    .link-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .link-title {
      margin: 0;
      font-size: 15px;
      line-height: 1.4;
      font-weight: 700;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .link-description {
      margin: 4px 0 0;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.4;
      letter-spacing: -0.02em;
      overflow: hidden;
      display: -webkit-box;
      line-clamp: 1;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
    }

    .link-arrow {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-soft);
      background: transparent;
      border: 1px solid transparent;
      opacity: 0.72;
      transform: translateX(0);
      transition:
        background-color 180ms ease,
        border-color 180ms ease,
        color 180ms ease,
        opacity 180ms ease,
        transform 180ms ease;
    }

    .link-arrow svg {
      width: 18px;
      height: 18px;
      display: block;
      stroke: currentColor;
    }

    .link-card:hover .link-arrow {
      color: var(--text);
      background: var(--control-hover);
      border-color: var(--border);
      opacity: 1;
      transform: translate(2px, -2px);
    }

    .empty-state {
      padding: 34px 16px 30px;
      text-align: center;
      border-radius: var(--radius-lg);
      background: var(--surface-soft);
      border: 1px dashed var(--border-strong);
    }

    .empty-icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 14px;
      border-radius: var(--radius-md);
      display: grid;
      place-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-soft);
      font-size: 26px;
    }

    .empty-state h3 {
      margin: 0;
      font-size: 16px;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .empty-state p {
      margin: 6px 0 0;
      color: var(--text-muted);
      font-size: 14px;
    }

    .footer {
      position: relative;
      margin-top: var(--stack-gap);
      padding: 18px 16px;
      text-align: center;
    }

    .footer p {
      margin: 0;
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.6;
    }

    .footer p:first-child {
      color: var(--text-muted);
      font-weight: 400;
    }

    .theme-switch {
      position: absolute;
      top: 50%;
      right: 16px;
      margin-top: 0;
      display: inline-flex;
      align-items: center;
      color: var(--text-soft);
      line-height: 1;
      transform: translateY(-50%);
    }

    .theme-switch-label {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      white-space: nowrap;
    }

    .theme-toggle {
      appearance: none;
      width: 28px;
      height: 28px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: grid;
      align-items: center;
      place-items: center;
      background: var(--surface-soft);
      color: var(--text-soft);
      cursor: pointer;
      transition:
        background-color 180ms ease,
        border-color 180ms ease,
        color 180ms ease;
    }

    .theme-toggle:hover {
      background: var(--control-hover);
      border-color: var(--border-strong);
      color: var(--text);
    }

    .theme-toggle:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px var(--focus-ring);
    }

    .theme-toggle i {
      font-size: 13px;
      line-height: 1;
    }

    @media (min-width: 760px) {
      .page-shell {
        padding: 54px 24px;
      }

      .page-container {
        max-width: 720px;
      }

      .profile-top {
        padding: 32px 32px 24px;
        align-items: center;
        gap: 16px;
      }

      .company-logo {
        width: 62px;
        height: 62px;
      }

      h1 {
        font-size: 15px;
      }

      .profile-description {
        padding: 20px 32px 20px;
        font-size: 14px;
      }

      .search-card {
        padding: 22px;
      }

      .link-section {
        padding: 20px;
      }

      .link-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
    }

    @media (min-width: 1080px) {
      .page-container {
        max-width: 860px;
      }

      .link-card {
        grid-template-columns: 42px minmax(0, 1fr) auto;
        gap: 14px;
      }

      .link-icon {
        width: 42px;
        height: 42px;
      }

      .link-description {
        display: block;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-clamp: unset;
        -webkit-line-clamp: unset;
        -webkit-box-orient: unset;
      }
    }

    @media (max-width: 380px) {
      .page-shell {
        padding: 16px 14px 22px;
      }

      @supports (padding: max(0px)) {
        .page-shell {
          padding:
            max(16px, env(safe-area-inset-top))
            max(14px, env(safe-area-inset-right))
            max(22px, env(safe-area-inset-bottom))
            max(14px, env(safe-area-inset-left));
        }
      }

      .profile-top {
        padding: 14px;
      }

      .company-logo {
        width: 48px;
        height: 48px;
      }

      .profile-description {
        padding: 14px;
      }

      .search-card {
        padding: 14px;
      }

      .link-section {
        padding: 14px;
      }

      .link-card {
        min-height: 74px;
        padding: 12px;
        grid-template-columns: 38px minmax(0, 1fr) auto;
        gap: 10px;
      }

      .link-icon {
        width: 38px;
        height: 38px;
      }

      .link-arrow {
        width: 32px;
        height: 32px;
      }
    }
  </style>
</head>

<body>
  <div id="pageLoader" class="loading-screen" role="status" aria-live="polite" aria-label="Loading page">
    <div class="loading-mark">
      <img class="loading-logo loading-logo-dark" src="perkom-loading.png" alt="" aria-hidden="true" />
      <img class="loading-logo loading-logo-light" src="perkom-loading-light.png" alt="" aria-hidden="true" />
    </div>
  </div>

  <main class="page-shell">
    <div class="page-container">
      <header class="profile-card">
        <div class="profile-top">
          <div class="company-logo">
            <img src="perkom-logo.png" alt="Logo Perusahaan" />
          </div>

          <div>
            <p class="company-name">Perkom Indah Murni</p>
            <h1>Internal Link Portal</h1>
          </div>
        </div>

        <div class="profile-divider"></div>

        <p class="profile-description">
          Centralized access to internal company links and shared resources.
        </p>
      </header>

      <section class="search-card">
        <label for="searchInput">Search Links</label>
        <div class="search-input-wrap">
          <span class="search-icon" aria-hidden="true">
            <i class="bi bi-search"></i>
          </span>
          <input id="searchInput" type="text" placeholder="Search by name or description"
            autocomplete="off" />
        </div>
      </section>

      <section class="link-section">
        <div class="section-header">
          <h2>Internal Links</h2>
          <span id="resultCount">0 links</span>
        </div>

        <div id="linkList" class="link-list"></div>

        <div id="emptyState" class="empty-state" hidden>
          <div class="empty-icon">⌕</div>
          <h3>No internal links found.</h3>
          <p>Coba gunakan kata kunci lain.</p>
        </div>
      </section>

      <footer class="footer">
        <p>© 2026 Perkom Link Portal</p>
        <p>Developed by Wahyu</p>
        <div class="theme-switch" role="group" aria-label="Theme preference">
          <span id="themeSwitchLabel" class="theme-switch-label">Dark</span>
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="Switch to light theme"
            aria-pressed="false">
            <i id="themeToggleIcon" class="bi bi-moon-fill" aria-hidden="true"></i>
          </button>
        </div>
      </footer>
    </div>
  </main>

  <script>
    const internalLinks = [
      {
        name: "Document Proposal Project Ayana Bali",
        category: "Documentation",
        description: "Penawaran, datasheet, design drawing, RFSI dan lainnya",
        icon: "bi-file-earmark-text",
        url: "https://ptperkomindahmurni.sharepoint.com/sites/DOCUMENTPROPOSALPROJECTAYANA-GROUP/Shared%20Documents/Forms/AllItems.aspx",
        badge: "Frequently Used",
      },
      {
        name: "Document Pre Installation Project Ayana Bali",
        category: "Documentation",
        description: "Material approval, shop drawing, schedule kerja dan lainnya",
        icon: "bi-file-earmark-text",
        url: "https://ptperkomindahmurni.sharepoint.com/sites/DOCUMENTPREINSTALLATION/Shared%20Documents/Forms/AllItems.aspx",
        badge: "Important",
      },
      {
        name: "Document After Installation Project Ayana Bali",
        category: "Documentation",
        description: "BAST, scan DO, as built drawing, foto pemasangan dan lainnya",
        icon: "bi-file-earmark-text",
        url: "https://ptperkomindahmurni.sharepoint.com/sites/DOCUMENTAFTERINSTALLATION/Dokumen%20Berbagi/Forms/AllItems.aspx",
        badge: "Frequently Used",
      },
      {
        name: "Travel Expense Form",
        category: "Form",
        description: "Form pengajuan biaya perjalanan",
        icon: "bi-file-earmark-text",
        url: "https://travelexpensepro.vercel.app/",
        badge: "",
      },
      {
        name: "Project Quotation Progress",
        category: "Update",
        description: "Update progress penawaran project cabling",
        icon: "bi-file-earmark-text",
        url: "https://ptperkomindahmurni-my.sharepoint.com/:x:/g/personal/wahyu_perkom_co_id/IQDGbV5HQfc-R6Y7A2CpGldgAUs5nwAVrEcflySGiQMoMXQ?e=piXdKY",
        badge: "",
      },
      {
        name: "Project Progress Ayana Bali",
        category: "Update",
        description: "Update progress pekerjaan project Ayana Bali",
        icon: "bi-file-earmark-text",
        url: "https://docs.google.com/spreadsheets/d/1INY7dGlIusZRGX0RKLKqqjtIiH4rxtKUb-7Us-DbvaI/edit?gid=1533323113#gid=1533323113",
        badge: "",
      },
    ];

    const searchInput = document.getElementById("searchInput");
    const linkList = document.getElementById("linkList");
    const resultCount = document.getElementById("resultCount");
    const emptyState = document.getElementById("emptyState");
    const themeToggle = document.getElementById("themeToggle");
    const themeSwitchLabel = document.getElementById("themeSwitchLabel");
    const themeToggleIcon = document.getElementById("themeToggleIcon");
    const themeColorMeta = document.getElementById("themeColorMeta");
    const pageLoader = document.getElementById("pageLoader");
    const THEME_STORAGE_KEY = "linkPortalTheme";
    const LOADER_MIN_DURATION = 2000;
    const loaderStartedAt = performance.now();

    function setTheme(theme) {
      const isLight = theme === "light";

      if (isLight) {
        document.documentElement.dataset.theme = "light";
      } else {
        document.documentElement.removeAttribute("data-theme");
      }

      themeToggle.setAttribute("aria-pressed", String(isLight));
      themeToggle.setAttribute(
        "aria-label",
        isLight ? "Switch to dark theme" : "Switch to light theme"
      );
      themeSwitchLabel.textContent = isLight ? "Light" : "Dark";
      themeToggleIcon.className = isLight ? "bi bi-sun-fill" : "bi bi-moon-fill";
      themeColorMeta.setAttribute("content", isLight ? "#f5f7fb" : "#101010");

      try {
        localStorage.setItem(THEME_STORAGE_KEY, isLight ? "light" : "dark");
      } catch {
        // Theme still applies for this session if storage is unavailable.
      }
    }

    function createLinkCard(link) {
      const card = document.createElement("a");

      card.className = "link-card";
      card.href = link.url;
      card.target = "_blank";
      card.rel = "noopener noreferrer";
      card.setAttribute(
        "aria-label",
        `Open ${link.name} - ${link.description}`
      );

      card.innerHTML = `
        <div class="link-icon" aria-hidden="true">
          <i class="bi ${link.icon}"></i>
        </div>

        <div class="link-content">
          <div class="link-title-row">
            <h3 class="link-title">${link.name}</h3>
          </div>

          <p class="link-description">${link.description}</p>
        </div>

        <span class="link-arrow" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 17L17 7" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M9 7H17V15" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </span>
      `;

      return card;
    }

    function isMatch(link, keyword) {
      const searchableText = `
        ${link.name}
        ${link.category}
        ${link.description}
        ${link.badge}
      `.toLowerCase();

      return searchableText.includes(keyword.toLowerCase());
    }

    function renderLinks() {
      const keyword = searchInput.value.trim();

      const filteredLinks = keyword
        ? internalLinks.filter((link) => isMatch(link, keyword))
        : internalLinks;

      const fragment = document.createDocumentFragment();

      filteredLinks.forEach((link) => {
        fragment.appendChild(createLinkCard(link));
      });

      linkList.replaceChildren(fragment);
      resultCount.textContent = `${filteredLinks.length} links`;

      const hasResult = filteredLinks.length > 0;
      emptyState.hidden = hasResult;
      linkList.hidden = !hasResult;
    }

    function hidePageLoader() {
      const elapsed = performance.now() - loaderStartedAt;
      const remainingDelay = Math.max(0, LOADER_MIN_DURATION - elapsed);

      window.setTimeout(() => {
        pageLoader?.classList.add("is-hidden");
        pageLoader?.addEventListener("transitionend", () => pageLoader.remove(), { once: true });
      }, remainingDelay);
    }

    const activeTheme = document.documentElement.dataset.theme === "light" ? "light" : "dark";

    setTheme(activeTheme);
    themeToggle.addEventListener("click", () => {
      const nextTheme = document.documentElement.dataset.theme === "light" ? "dark" : "light";

      setTheme(nextTheme);
    });

    searchInput.addEventListener("input", renderLinks);

    renderLinks();

    if (document.readyState === "complete") {
      hidePageLoader();
    } else {
      window.addEventListener("load", hidePageLoader, { once: true });
    }
  </script>
</body>

</html>
