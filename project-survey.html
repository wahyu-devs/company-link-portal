<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Survey Form | Perkom Indah Murni</title>
  <meta name="description"
    content="Record project requirement data in one structured form." />
  <link rel="icon" type="image/png" href="assets/images/favicon.png" />
  <link rel="shortcut icon" type="image/png" href="assets/images/favicon.png" />
  <link rel="apple-touch-icon" href="assets/images/perkom-logo.png" />
  <meta id="themeColorMeta" name="theme-color" content="#101010" />
  <meta property="og:locale" content="id_ID" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Perkom Indah Murni" />
  <meta property="og:title" content="Project Survey Form" />
  <meta property="og:description"
    content="Record project requirement data in one structured form." />
  <meta property="og:image" content="assets/images/project-survey-social-preview.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Project Survey Form social preview." />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Project Survey Form" />
  <meta name="twitter:description"
    content="Record project requirement data in one structured form." />
  <meta name="twitter:image" content="assets/images/project-survey-social-preview.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script defer src="https://accounts.google.com/gsi/client"></script>
  <script defer src="project-survey.config.js"></script>
  <script defer src="project-survey.js"></script>
  <!-- Vercel Web Analytics -->
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>

<body class="survey-page">
  <div id="pageLoader" class="loading-screen" role="status" aria-live="polite" aria-label="Loading page">
    <div class="loading-mark">
      <img class="loading-logo loading-logo-dark" src="assets/images/perkom-loading.png" alt="" aria-hidden="true" />
      <img class="loading-logo loading-logo-light" src="assets/images/perkom-loading-light.png" alt="" aria-hidden="true" />
    </div>
  </div>

  <main class="page-shell">
    <div class="page-container">
      <header class="profile-card">
        <div class="profile-top">
          <div class="company-logo">
            <img src="assets/images/perkom-logo.png" alt="Logo Perusahaan" />
          </div>

          <div class="profile-title">
            <p class="company-name">Perkom Indah Murni</p>
            <h1>Project Survey Form</h1>
          </div>

          <a class="survey-home-button" href="index.html" aria-label="Back to home">
            <i class="bi bi-arrow-left-short" aria-hidden="true"></i>
            <span>Back to Home</span>
          </a>
        </div>

        <div class="profile-divider"></div>

        <p class="profile-description">
          Record project requirement data in one structured form.
        </p>
      </header>

      <form id="surveyForm" class="survey-form">
        <section class="survey-card">
          <div class="survey-card-header">
            <h2>Informasi Survey</h2>
          </div>

          <div class="survey-field-grid">
            <label>
              <span>Tanggal Survey</span>
              <input id="surveyDate" name="surveyDate" type="date" required />
            </label>

            <label>
              <span>Nama Surveyor</span>
              <input id="surveyorName" name="surveyorName" type="text" required />
            </label>

            <label>
              <span>Nama Customer</span>
              <input id="customerName" name="customerName" type="text" required />
            </label>

            <label>
              <span>PIC Customer</span>
              <input id="customerPic" name="customerPic" type="text" required />
            </label>

            <label class="survey-field-wide">
              <span>Nama Project</span>
              <input id="projectName" name="projectName" type="text" required />
            </label>
          </div>
        </section>

        <section class="survey-card" data-section="pulls">
          <div class="survey-card-header">
            <h2>Tarikan Kabel</h2>
            <button class="survey-add-row" type="button" data-add-row="pulls" aria-label="Tambah tarikan kabel">
              <i class="bi bi-plus-lg" aria-hidden="true"></i>
              <span>Tambah Item</span>
            </button>
          </div>

          <div class="survey-table-wrap">
            <div class="survey-table survey-table-pulls" id="pullRows"></div>
          </div>
        </section>

        <section class="survey-card" data-section="activeDevices">
          <div class="survey-card-header">
            <h2>Perangkat Aktif</h2>
            <button class="survey-add-row" type="button" data-add-row="activeDevices" aria-label="Tambah perangkat aktif">
              <i class="bi bi-plus-lg" aria-hidden="true"></i>
              <span>Tambah Item</span>
            </button>
          </div>

          <div class="survey-table-wrap">
            <div class="survey-table survey-table-items" id="activeDeviceRows"></div>
          </div>
        </section>

        <section class="survey-card" data-section="materials">
          <div class="survey-card-header">
            <h2>Material</h2>
            <button class="survey-add-row" type="button" data-add-row="materials" aria-label="Tambah material">
              <i class="bi bi-plus-lg" aria-hidden="true"></i>
              <span>Tambah Item</span>
            </button>
          </div>

          <div class="survey-table-wrap">
            <div class="survey-table survey-table-items" id="materialRows"></div>
          </div>
        </section>

        <section class="survey-card" data-section="extras">
          <div class="survey-card-header">
            <h2>Pekerjaan Tambahan</h2>
            <button class="survey-add-row" type="button" data-add-row="extras" aria-label="Tambah pekerjaan tambahan">
              <i class="bi bi-plus-lg" aria-hidden="true"></i>
              <span>Tambah Item</span>
            </button>
          </div>

          <div class="survey-table-wrap">
            <div class="survey-table survey-table-items" id="extraRows"></div>
          </div>
        </section>

        <section class="survey-actions" aria-label="Survey form actions">
          <button class="survey-primary-action" type="button" id="saveSurvey">
            <i class="bi bi-floppy" aria-hidden="true"></i>
            <span>Save</span>
          </button>

          <button class="survey-primary-action" type="button" id="loadSurvey">
            <i class="bi bi-folder2-open" aria-hidden="true"></i>
            <span>Load</span>
          </button>

          <button class="survey-primary-action" type="button" id="resetSurvey" aria-label="Buat dokumen survey baru">
            <i class="bi bi-file-earmark-plus" aria-hidden="true"></i>
            <span>New</span>
          </button>

          <button class="survey-primary-action" type="button" id="downloadExcel">
            <i class="bi bi-file-earmark-spreadsheet" aria-hidden="true"></i>
            <span>Download Excel</span>
          </button>

          <button class="survey-primary-action" type="button" id="downloadPdf">
            <i class="bi bi-file-earmark-pdf" aria-hidden="true"></i>
            <span>Download PDF</span>
          </button>

          <button class="survey-primary-action" type="button" id="submitSurvey" disabled aria-disabled="true">
            <i class="bi bi-send" aria-hidden="true"></i>
            <span>Submit</span>
          </button>
        </section>

      </form>

      <div class="survey-modal" id="savedSurveyModal" role="dialog" aria-modal="true"
        aria-labelledby="savedSurveyTitle" hidden>
        <button class="survey-modal-backdrop" type="button" data-close-saved-modal aria-label="Tutup daftar form tersimpan"></button>

        <section class="survey-saved-panel survey-modal-panel" id="savedSurveyPanel" aria-label="Saved survey forms">
          <div class="survey-saved-header">
            <h2 id="savedSurveyTitle">Saved Forms</h2>
            <button class="survey-modal-close" type="button" id="savedSurveyClose" aria-label="Tutup daftar form tersimpan">
              <i class="bi bi-x-lg" aria-hidden="true"></i>
            </button>
          </div>
          <label class="survey-saved-search" for="savedSurveySearch">
            <span class="survey-saved-search-icon">
              <i class="bi bi-search" aria-hidden="true"></i>
            </span>
            <input id="savedSurveySearch" type="search" autocomplete="off" placeholder="Search saved form" />
          </label>
          <div class="survey-saved-list" id="savedSurveyList"></div>
        </section>
      </div>

      <div id="surveyToast" class="survey-toast" role="status" aria-live="polite" aria-atomic="true" hidden></div>

      <footer class="footer">
        <p>© 2026 Perkom Link Portal</p>
        <p>Developed by Wahyu</p>
        <div class="theme-switch" role="group" aria-label="Theme preference">
          <span id="themeSwitchLabel" class="theme-switch-label">Dark</span>
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="Switch to light theme"
            aria-pressed="false">
            <i id="themeToggleIcon" class="bi bi-moon-fill" aria-hidden="true"></i>
          </button>
        </div>
      </footer>
    </div>
  </main>
</body>

</html>
